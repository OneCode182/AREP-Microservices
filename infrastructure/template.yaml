AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: java17
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        POSTS_TABLE: !Ref PostsTable

Resources:
  PostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: arep-twitter-posts
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: arn:aws:iam::478348415664:role/LabRole
      Handler: edu.eci.arep.twitter.lambda.UserHandler::handleRequest
      CodeUri: ../microservices/user-function/
      Events:
        GetMe:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/me
            Method: GET

  PostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: arn:aws:iam::478348415664:role/LabRole
      Handler: edu.eci.arep.twitter.lambda.PostsHandler::handleRequest
      CodeUri: ../microservices/posts-function/
      Events:
        CreatePost:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/posts
            Method: POST

  StreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: arn:aws:iam::478348415664:role/LabRole
      Handler: edu.eci.arep.twitter.lambda.StreamHandler::handleRequest
      CodeUri: ../microservices/stream-function/
      Events:
        GetStream:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/stream
            Method: GET
        GetPosts:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/posts
            Method: GET

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'
  PostsTableName:
    Description: DynamoDB table name
    Value: !Ref PostsTable
